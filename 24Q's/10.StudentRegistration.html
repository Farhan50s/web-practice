    <title>Student Registration Form</title>

    <style>

<body>

    <h2>Student Registration Form</h2>

    <form>

        Name:
        <input type="text">

        <br>

        Email:
        <input type="email">

        <br>

        Password:
        <input type="password">

        <br>

        Gender:

        <input type="radio" name="gender"> Male

        <input type="radio" name="gender"> Female

        <br><br>

        Course:

        <select>
            <option>BSIT</option>
            <option>BSCS</option>
            <option>BBA</option>
        </select>

        <br><br>

        <input type="submit" value="Register">

    </form>

</body>
</html>
