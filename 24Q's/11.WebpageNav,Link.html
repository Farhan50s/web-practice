<!DOCTYPE html>
<html>
<head>
    <title>Web Technologies</title>

    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
        }
          ul{
            list-style:none;
            background-color: black;
            padding: 10px;
        }

        li{
            display:inline-block;
            margin-right:20px;
            position:relative;
        }

         a{
            text-decoration:none;
            color:white;
        }

        .dropdown-content{
            display:none;
            position:absolute;
            padding:5px;
        }

        .dropdown:hover .dropdown-content{
            display:block;
            background-color: grey;
        }

    </style>
</head>

<body>

    <!-- Navigation Menu -->

    <ul>

        <li><a href="#">Home</a></li>

        <li><a href="#">About</a></li>

        <li class="dropdown">

            <a href="#">Courses</a>

            <div class="dropdown-content">
                <a href="#">HTML</a>
                <a href="#">CSS</a>
                <a href="#">JavaScript</a>
            </div>

        </li>

        <li><a href="#">Contact</a></li>

    </ul>

    <!-- Image and Hyperlink -->

    <div class="image-section">

        <h2>Web Technologies</h2>

        <img src="web.jpg" alt="Web Image">

        <br><br>

        <a href="https://www.google.com">
            Visit Google
        </a>

    </div>

</body>
</html>
