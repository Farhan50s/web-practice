        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: Arial, sans-serif;
            }

            /* Navigation Bar */
            nav {
                background-color: black;
                color: white;
                padding: 15px;
                text-align: left;
                
            }
            ul{
                list-style:none;
            }
            li{
                display:inline-block;
                margin-right:20px;
                position:relative;
            }
            a{
                text-decoration:none;
                color:white;
            }
            /* Cards Section */
            .container {
                display: flex;
                justify-content: space-evenly;
                flex-wrap: wrap;
                margin: 20px;
                align-items: center;
            }

            .card {
                width: 300px;
                border: 1px solid gray;
                padding: 20px;
                margin: 10px;
                text-align: center;
                border-radius: 5px;
            }

            .card button {
                padding: 10px 20px;
                background-color: rgb(114, 197, 225);
                color: white;
                border: none;
                cursor: pointer;
                margin-top: 15px;
                border-radius: 20px;
            }

            /* Footer */
            footer {
                background-color: black;
                color: white;
                text-align: center;
                padding: 15px;
                margin-top: 20px;
            }

            /* Responsive Design */
            @media(max-width:768px) {
                .container {
                    flex-direction: column;
                    align-items: center;
                }
            }
        </style>
        

    </head>

    <body>

        
        <!-- Navigation Bar -->
        <nav>
            <ul> <li><a>Home</a></li> 
                 <li><a>About</a></li> 
                 <li><a>Contact</a></li>    
            </ul>
        </nav>

        <!-- Cards -->
        <div class="container">

            <div class="card">
                <h3>Card 1</h3>
                <p>This is the first card.</p>
                <button>Click Me</button>
            </div>

            <div class="card">
                <h3>Card 2</h3>
                <p>This is the second card.</p>
                <button>Click Me</button>
            </div>

            <div class="card">
                <h3>Card 3</h3>
                <p>This is the third card.</p>
                <button>Click Me</button>
            </div>

        </div>

        <!-- Footer -->
        <footer>
            Footer Section
        </footer>
       


</body>
