<!DOCTYPE html>
<html>
<head>
    <title>Restaurant Header</title>
    <style>
        /* Reset and base */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }

        /* Header container */
        .header {
            background: #1e272e;       /* dark background */
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
        }

        /* Logo + name (left side) */
        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #f1c40f;
        }

        .restaurant-name {
            font-size: 26px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .restaurant-name span {
            color: #f1c40f;   /* yellow accent */
        }

        /* Navigation (right side) */
        .nav a {
            color: white;
            text-decoration: none;
            font-size: 17px;
            margin-left: 25px;
            padding: 6px 10px;
            border-radius: 4px;
            transition: 0.3s;
        }

        .nav a:hover {
            background: #f1c40f;
            color: #1e272e;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <div class="header">

        <!-- Logo + Name -->
        <div class="brand">
            <!-- Replace "https://via.placeholder.com/50" with your own image file -->
            <img class="logo" src="#" alt="Restaurant Logo">
            <div class="restaurant-name">Taste <span>Hub</span></div>
        </div>

        <!-- Navigation -->
        <div class="nav">
            <a href="#">Home</a>
            <a href="#">Menu</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>

    </div>

</body>
</html>
